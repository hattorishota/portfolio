<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio</title>
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />
    <link rel="stylesheet" type="text/css" href="./css/swiper-bundle.min.css" />
    <link rel="stylesheet" type="text/css" href="./css/fullpage.min.css" />

    <script>
      (function (d) {
        var config = {
            kitId: "vbb4bvl",
            scriptTimeout: 3000,
            async: true,
          },
          h = d.documentElement,
          t = setTimeout(function () {
            h.className =
              h.className.replace(/\bwf-loading\b/g, "") + " wf-inactive";
          }, config.scriptTimeout),
          tk = d.createElement("script"),
          f = false,
          s = d.getElementsByTagName("script")[0],
          a;
        h.className += " wf-loading";
        tk.src = "https://use.typekit.net/" + config.kitId + ".js";
        tk.async = true;
        tk.onload = tk.onreadystatechange = function () {
          a = this.readyState;
          if (f || (a && a != "complete" && a != "loaded")) return;
          f = true;
          clearTimeout(t);
          try {
            Typekit.load(config);
          } catch (e) {}
        };
        s.parentNode.insertBefore(tk, s);
      })(document);
    </script>
  </head>
  <body>
    <div class="wrapper">
      <!-- header area -->
      <header class="under-header">
        <nav class="nav">
          <div class="left">
            <div class="logo-box">
              <span class="logo"
                ><a href="./index.html" class="athelas-bold">HATTORI SHOTA</a></span
              >
            </div>
          </div>
          <div class="right">
            <!-- ナビゲーションメニュー -->
            <div class="nav-wrapper">
              <nav class="header-nav">
                <ul class="nav-list">
                  <li class="nav-item">
                    <a href="./index.html" class="athelas-reg">Home</a>
                  </li>
                  <li class="nav-item">
                    <a href="./about.html" class="athelas-reg">About</a>
                  </li>
                  <li class="nav-item">
                    <a href="./works.html" class="athelas-reg">Works</a>
                  </li>
                  <li class="nav-item">
                    <a href="./skills.html" class="athelas-reg">Skills</a>
                  </li>
                  <li class="nav-item">
                    <a href="./contact.html" class="athelas-reg">Contact</a>
                  </li>
                </ul>
              </nav>
            </div>
            <!-- ハンバーガーボタン -->
            <div class="humberger">
              <button class="burger-btn">
                <span class="bar bar_top"></span>
                <span class="bar bar_mid"></span>
                <span class="bar bar_bottom"></span>
              </button>
              <span class="menu athelas-reg">Menu</span>
            </div>
          </div>
        </nav>
      </header>
      <!-- header area -->

      <!-- contents area -->
      <div class="under">
        <main class="main">
          <div class="check">
            <div class="wrap">
              <div class="contents">
                <div class="title-box">
                  <h1 class="title athelas-reg">Contact</h1>
                </div>
                <div class="leading-box">
                  <p class="leading yu-gothic">確認画面</p>
                </div>
                <div class="form fadein">
                  <form class="contact-form" action="" method="post">
                    <div class="item yu-gothic">
                      <label class="label" for="name_b" name="name">お名前</label>
                      <p class="check-txt yu-gothic">山田　太郎</p>
                    </div>
                    <div class="item yu-gothic">
                      <label class="label" for="name_s" name="name">フリガナ</label>
                      <p class="check-txt yu-gothic">ヤマダ　タロウ</p>
                    </div>
                    <div class="item yu-gothic">
                      <label class="label" for="e-mail">メールアドレス</label>
                      <p class="check-txt yu-gothic">sample@mail.com</p>
                    </div>
                    <div class="item yu-gothic">
                      <label class="label" for="address" name="name">住所</label>
                      <p class="check-txt yu-gothic">札幌市中央区北3条西6丁目-8-28-405</p>
                    </div>
                    <div class="item yu-gothic">
                      <label class="label" for="tel" name="name">電話番号</label>
                      <p class="check-txt yu-gothic">011-231-4111</p>
                    </div>
                    <div class="item yu-gothic">
                      <label class="label" for="message">お問い合わせ内容</label>
                      <textarea rows="4" id="message" placeholder="こちらにご記入ください" name="comment"></textarea>
                    </div>
                    <div class="item no-label button">
                      <input type="submit" value="確認画面へ">
                      <a href="./contact-thanks.html">あ</a>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
      <!-- contents area -->

      <footer class="footer">
        <p class="copyright athelas-bold">©︎  HATTORI SHOTA</p>
      </footer>
    </div>

    <!-- script area -->
    <script src="./js/jquery-3.6.0.min.js"></script>
    <script src="./js/progressbar.min.js"></script>
    <script src="./js/scrolloverflow.min.js"></script>
    <script src="./js/fullpage.min.js"></script>
    <script src="./js/particles.min.js"></script>
    <script src="./js/swiper-bundle.min.js"></script>
    <script src="./js/jquery.inview.min.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
